<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار غريب القرآن</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 10px;
            direction: rtl; /* Основное направление страницы — справа налево */
        }
        #quiz-container { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 550px; 
        }
        .header { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 15px; 
            font-size: 1rem; 
            color: #666;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .question-box { 
            font-size: 2rem; 
            text-align: center; 
            margin: 30px 0; 
            color: #1a1a1a; 
            line-height: 1.5;
            font-weight: bold;
        }
        .options { 
            display: grid; 
            gap: 12px; 
        }
        button.option-btn { 
            padding: 16px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            background: #fdfdfd; 
            cursor: pointer; 
            font-size: 1.1rem; 
            transition: all 0.2s; 
            text-align: right;
            line-height: 1.4;
        }
        button.option-btn:hover { background: #f5f5f5; }
        
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        
        #next-btn { 
            display: none; 
            width: 100%; 
            margin-top: 25px; 
            padding: 18px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.3rem; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s;
        }
        #next-btn:hover { background: #218838; }

        #result-screen { display: none; text-align: center; }
        .score { font-size: 3rem; font-weight: bold; color: #28a745; margin: 20px 0; }
        .restart-btn { 
            padding: 15px 40px; 
            border-radius: 12px; 
            border: none; 
            background: #6c757d; 
            color: white; 
            font-size: 1.1rem; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-game">
        <div class="header">
            <span id="counter">السؤال 1</span>
            <span id="score-live">النقاط: 0</span>
        </div>
        <div class="question-box" id="q-text">جاري التحميل...</div>
        <div class="options" id="ans-box"></div>
        <button id="next-btn">السؤال التالي ←</button>
    </div>

    <div id="result-screen">
        <h2>اكتمل الاختبار!</h2>
        <div class="score" id="final-score">0 / 0</div>
        <button class="restart-btn" onclick="location.reload()">إعادة الاختبار</button>
    </div>
</div>

let currentIdx = 0;
let score = 0;
let answered = false;
const allAnswers = quizData.map(i => i.a);

function showQuestion() {
    answered = false;
    const item = quizData[currentIdx];
    const nextBtn = document.getElementById('next-btn');
    const ansBox = document.getElementById('ans-box');
    
    nextBtn.style.display = 'none';
    document.getElementById('counter').innerText = `السؤال ${currentIdx + 1} من ${quizData.length}`;
    document.getElementById('q-text').innerText = item.q;
    ansBox.innerHTML = '';

    let choices = [item.a];
    while(choices.length < 4) {
        let r = allAnswers[Math.floor(Math.random() * allAnswers.length)];
        if(!choices.includes(r)) choices.push(r);
    }
    choices.sort(() => Math.random() - 0.5);

    choices.forEach(text => {
        const btn = document.createElement('button');
        btn.classList.add('option-btn');
        btn.innerText = text;
        btn.onclick = () => {
            if(answered) return;
            answered = true;
            if(text === item.a) {
                btn.classList.add('correct');
                score++;
                document.getElementById('score-live').innerText = `النقاط: ${score}`;
            } else {
                btn.classList.add('wrong');
                Array.from(ansBox.children).forEach(b => {
                    if(b.innerText === item.a) b.classList.add('correct');
                });
            }
            nextBtn.style.display = 'block';
        };
        ansBox.appendChild(btn);
    });
}

document.getElementById('next-btn').onclick = () => {
    currentIdx++;
    if(currentIdx < quizData.length) {
        showQuestion();
    } else {
        document.getElementById('quiz-game').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
    }
};

showQuestion();
</script>
